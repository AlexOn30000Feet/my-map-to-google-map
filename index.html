<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Google Maps...</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>กำลังพานายไปที่แผนที่...</h2>
        <p>หากไม่เปลี่ยนหน้าอัตโนมัติ <a id="manual-link" href="#">คลิกที่นี่</a></p>
    </div>

    <script>
        // 1. ดึงค่า ID จาก URL
        const urlParams = new URLSearchParams(window.location.search);
        const mapId = urlParams.get('id');

        if (mapId) {
            // 2. สร้างลิงก์สำหรับ Google Maps App โดยเฉพาะ
            const googleMapsUrl = "https://www.google.com/maps/search/?api=1&query=" + mapId + "&shorturl=1";
            const shortUrl = "https://goo.gl/maps/" + mapId;

            // ตั้งค่าลิงก์สำรองเผื่อลูกค้าอยากกดเอง
            document.getElementById('manual-link').href = shortUrl;

            // 3. สั่งให้ดีดไป Google Maps ทันที
            window.location.href = shortUrl;
        } else {
            document.querySelector('h2').innerText = "ไม่พบรหัสแผนที่ กรุณาตรวจสอบลิงก์";
        }
    </script>
</body>
</html>
