<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Land Map...</title>
    <style>
        /* สไตล์หน้าโหลดแบบเนียนๆ สไตล์ UI/UX สมัยใหม่ */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 1.1rem; font-weight: 500; margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h2>กำลังนำคุณไปยังพิกัดแผนที่...</h2>
    </div>

    <script>
        </body>
       // 1. ดึงค่า Query String ทั้งหมดจาก URL body  const urlParams = new URLSearchParams(window.location.search);
        const mapId = urlParams.get('id');

        if (mapId) {
            // ระบบจะทำการ Redirect ไปยัง Google Maps ทันที
            // ถ้าลูกค้าใช้มือถือ มันจะพยายามเปิดแอป Google Maps ขึ้นมาเอง (Deep Link)
            window.location.href = "https://goo.gl/maps/" + mapId;
        } else {
            // กรณีลืมใส่ ID หรือลิงก์ผิด
            document.querySelector('h2').innerText = "ไม่พบรหัสแผนที่ กรุณาตรวจสอบลิงก์อีกครั้ง";
            document.querySelector('.loader').style.display = 'none';
        }
    </script>
  </body,
  </html>
